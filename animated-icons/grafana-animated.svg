  </g>
  <text x="50" y="112" font-size="13" text-anchor="middle" fill="#F46800" font-family="Verdana, Arial, sans-serif" font-weight="600">Grafana
    <animate attributeName="opacity" values="1;0.55;1" dur="2.4s" repeatCount="indefinite"/>
  </text>
</svg>
