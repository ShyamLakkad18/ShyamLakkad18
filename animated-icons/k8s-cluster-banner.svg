<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <defs>
    <linearGradient id="k8sbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#203a43"/>
    </linearGradient>
    <filter id="k8sglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="360" rx="16" fill="url(#k8sbg)"/>

  <text x="450" y="34" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="27" font-weight="bold" fill="#326CE5">☸️ My Kubernetes Cluster</text>

  <!-- Control Plane box -->
  <g transform="translate(450,90)">
    <rect x="-140" y="-32" width="280" height="64" rx="12" fill="#161b22" stroke="#326CE5" stroke-width="2.5">
      <animate attributeName="stroke-width" values="2.5;3.5;2.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text text-anchor="middle" y="-6" font-size="20" font-family="Verdana, Arial, sans-serif" font-weight="bold" fill="#ffffff">Control Plane</text>
    <text text-anchor="middle" y="16" font-size="15" font-family="Fira Code, monospace" fill="#8fd3fe">API Server · Scheduler · etcd</text>

    <!-- rotating sync ring around control plane -->
    <circle r="52.9" fill="none" stroke="#326CE5" stroke-width="1.5" stroke-dasharray="5 7" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- connecting lines control plane -> worker nodes -->
  <path d="M 350 122 L 170 210" stroke="#326CE5" stroke-width="2" opacity="0.45"/>
  <path d="M 450 122 L 450 210" stroke="#326CE5" stroke-width="2" opacity="0.45"/>
  <path d="M 550 122 L 730 210" stroke="#326CE5" stroke-width="2" opacity="0.45"/>

  <!-- scheduling pulse dots flowing down -->
  <circle r="6.0" fill="#00F7FF" filter="url(#k8sglow)">
    <animateMotion dur="2.4s" repeatCount="indefinite" path="M 350 122 L 170 210"/>
  </circle>
  <circle r="6.0" fill="#00F7FF" filter="url(#k8sglow)">
    <animateMotion dur="2.4s" begin="0.8s" repeatCount="indefinite" path="M 450 122 L 450 210"/>
  </circle>
  <circle r="6.0" fill="#00F7FF" filter="url(#k8sglow)">
    <animateMotion dur="2.4s" begin="1.6s" repeatCount="indefinite" path="M 550 122 L 730 210"/>
  </circle>

  <!-- Worker Node template: repeated 3x via groups -->
  <!-- Node 1 -->
  <g transform="translate(170,240)">
    <rect x="-110" y="-40" width="220" height="110" rx="10" fill="#161b22" stroke="#F46800" stroke-width="2"/>
    <text text-anchor="middle" y="-20" font-size="18" font-family="Verdana, Arial, sans-serif" font-weight="bold" fill="#F46800">Worker Node 1</text>
    <g transform="translate(-60,10)">
      <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#0d1117" stroke="#00F7FF" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
      </rect>
      <text text-anchor="middle" dy="5" font-size="15" fill="#00F7FF">Pod</text>
    </g>
    <g transform="translate(0,10)">
      <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#0d1117" stroke="#00F7FF" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
      </rect>
      <text text-anchor="middle" dy="5" font-size="15" fill="#00F7FF">Pod</text>
    </g>
    <g transform="translate(60,10)">
      <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#0d1117" stroke="#00F7FF" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
      </rect>
      <text text-anchor="middle" dy="5" font-size="15" fill="#00F7FF">Pod</text>
    </g>
  </g>

  <!-- Node 2 -->
  <g transform="translate(450,240)">
    <rect x="-110" y="-40" width="220" height="110" rx="10" fill="#161b22" stroke="#EF7B4D" stroke-width="2"/>
    <text text-anchor="middle" y="-20" font-size="18" font-family="Verdana, Arial, sans-serif" font-weight="bold" fill="#EF7B4D">Worker Node 2</text>
    <g transform="translate(-60,10)">
      <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#0d1117" stroke="#00F7FF" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.8s" begin="0.2s" repeatCount="indefinite"/>
      </rect>
      <text text-anchor="middle" dy="5" font-size="15" fill="#00F7FF">Pod</text>
    </g>
    <g transform="translate(0,10)">
      <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#0d1117" stroke="#00F7FF" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
      </rect>
      <text text-anchor="middle" dy="5" font-size="15" fill="#00F7FF">Pod</text>
    </g>
    <g transform="translate(60,10)">
      <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#0d1117" stroke="#00F7FF" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.8s" begin="1s" repeatCount="indefinite"/>
      </rect>
      <text text-anchor="middle" dy="5" font-size="15" fill="#00F7FF">Pod</text>
    </g>
  </g>

  <!-- Node 3 -->
  <g transform="translate(730,240)">
    <rect x="-110" y="-40" width="220" height="110" rx="10" fill="#161b22" stroke="#844FBA" stroke-width="2"/>
    <text text-anchor="middle" y="-20" font-size="18" font-family="Verdana, Arial, sans-serif" font-weight="bold" fill="#844FBA">Worker Node 3</text>
    <g transform="translate(-60,10)">
      <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#0d1117" stroke="#00F7FF" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.8s" begin="0.1s" repeatCount="indefinite"/>
      </rect>
      <text text-anchor="middle" dy="5" font-size="15" fill="#00F7FF">Pod</text>
    </g>
    <g transform="translate(0,10)">
      <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#0d1117" stroke="#00F7FF" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.8s" begin="0.5s" repeatCount="indefinite"/>
      </rect>
      <text text-anchor="middle" dy="5" font-size="15" fill="#00F7FF">Pod</text>
    </g>
    <g transform="translate(60,10)">
      <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#0d1117" stroke="#00F7FF" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.8s" begin="0.9s" repeatCount="indefinite"/>
      </rect>
      <text text-anchor="middle" dy="5" font-size="15" fill="#00F7FF">Pod</text>
    </g>
  </g>

  <text x="450" y="345" text-anchor="middle" font-family="Fira Code, monospace" font-size="18" fill="#326CE5" opacity="0.9">
    kubectl apply -f deployment.yaml → Scheduled → Running ✅
  </text>
</svg>
