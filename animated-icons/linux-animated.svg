<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100" height="120" viewBox="0 0 100 120">
  <circle cx="50" cy="46" r="38" fill="none" stroke="#FCC624" stroke-width="2" stroke-dasharray="6 6" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 50 46" to="360 50 46" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="46" r="30" fill="#FCC624" opacity="0.16">
    <animate attributeName="r" values="30;38;30" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.20;0.02;0.20" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="46" r="27" fill="#161b22" stroke="#FCC624" stroke-width="1.5">
    <animate attributeName="r" values="27;29;27" dur="2s" repeatCount="indefinite"/>
  </circle>
  <image href="https://cdn.simpleicons.org/linux/FCC624" x="34" y="30" width="32" height="32"/>
  <text x="50" y="112" font-size="13" text-anchor="middle" fill="#FCC624" font-family="Verdana, Arial, sans-serif" font-weight="600">Linux
    <animate attributeName="opacity" values="1;0.55;1" dur="2.4s" repeatCount="indefinite"/>
  </text>
</svg>
