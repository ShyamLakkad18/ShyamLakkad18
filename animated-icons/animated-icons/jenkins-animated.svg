<svg xmlns="http://www.w3.org/2000/svg" width="100" height="120" viewBox="0 0 100 120">
  <circle cx="50" cy="46" r="38" fill="none" stroke="#D24939" stroke-width="2" stroke-dasharray="6 6" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 50 46" to="360 50 46" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="46" r="30" fill="#D24939" opacity="0.18">
    <animate attributeName="r" values="30;38;30" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.22;0.02;0.22" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="46" r="26" fill="#D24939">
    <animate attributeName="r" values="26;28;26" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="50" y="54" font-size="22" text-anchor="middle" fill="#0d1117" font-family="Verdana, Arial, sans-serif" font-weight="bold">JK</text>
  <text x="50" y="112" font-size="13" text-anchor="middle" fill="#D24939" font-family="Verdana, Arial, sans-serif" font-weight="600">Jenkins
    <animate attributeName="opacity" values="1;0.55;1" dur="2.4s" repeatCount="indefinite"/>
  </text>
</svg>
