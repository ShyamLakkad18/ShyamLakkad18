<svg xmlns="http://www.w3.org/2000/svg" width="100" height="120" viewBox="0 0 100 120">
  <circle cx="50" cy="46" r="38" fill="none" stroke="#F46800" stroke-width="2" stroke-dasharray="6 6" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 50 46" to="360 50 46" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="46" r="30" fill="#F46800" opacity="0.16">
    <animate attributeName="r" values="30;38;30" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.20;0.02;0.20" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="46" r="27" fill="#161b22" stroke="#F46800" stroke-width="1.5">
    <animate attributeName="r" values="27;29;27" dur="2s" repeatCount="indefinite"/>
  </circle>
  <g transform="translate(50,46)">
    <g transform="translate(0,3)">
      <circle cx="0" cy="0" r="15" fill="none" stroke="#ffffff" stroke-width="2.2"/>
      <path d="M 0 0 L 0 -15 A 15 15 0 0 1 13 -7.5 Z" fill="#ffffff"/>
      <circle cx="0" cy="0" r="4.5" fill="#ffffff"/>
